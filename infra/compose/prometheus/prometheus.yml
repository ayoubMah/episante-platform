global:
  scrape_interval: 10s # Scrape every 10 seconds
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'episante-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - 'appointment-service:9093'
        - 'auth-service:9094'
        - 'doctor-service:9092'
        - 'patient-service:9091'